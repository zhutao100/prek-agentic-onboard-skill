# ios/.pre-commit-config.yaml (or swift/)
# Prefer first-party `swift-format` for modern Swift codebases.
repos:
  - repo: local
    hooks:
      - id: swift-format
        name: swift-format (format)
        entry: swift-format format --in-place --parallel
        language: system
        files: \.swift$
        require_serial: true
      - id: swift-format-lint
        name: swift-format (lint --strict)
        entry: swift-format lint --strict --parallel
        language: system
        files: \.swift$
        require_serial: true
