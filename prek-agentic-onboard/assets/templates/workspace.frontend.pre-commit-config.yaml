# frontend/.pre-commit-config.yaml
repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier (write)
        language: system
        entry: pnpm exec prettier --write
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown]
      - id: eslint
        name: eslint (fix)
        language: system
        entry: pnpm exec eslint --fix
        types_or: [javascript, jsx, ts, tsx]
